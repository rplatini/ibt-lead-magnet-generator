<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<script src="https://cdn.tailwindcss.com"></script>
	<link href="https://fonts.googleapis.com/css2?family={{styleTokens.fontFamily}}:wght@400;600;800&display=swap" rel="stylesheet" />
	<style>
		* { box-sizing: border-box; }
		html, body { margin: 0; padding: 0; }
		body { font-family: "{{styleTokens.fontFamily}}", system-ui, sans-serif; }
		/* PDF pagination: every page-defining section is one A4 page tall. */
		.lm-page {
			min-height: 100vh;
			break-inside: avoid;
			page-break-after: always;
			page-break-inside: avoid;
		}
		.lm-page:last-child { page-break-after: auto; }
		.brand-bg { background: {{styleTokens.brandColor}}; }
		.brand-fg { color: {{styleTokens.brandColor}}; }
		.accent-bg { background: {{styleTokens.accentColor}}; }
	</style>
</head>
<body>
	<section class="lm-page cover flex flex-col justify-between p-16 brand-bg text-white">
		<div>
			{{#if styleTokens.logoUrl}}<img src="{{styleTokens.logoUrl}}" class="h-10" alt="logo" />{{/if}}
		</div>
		<div>
			<p class="uppercase tracking-widest text-sm opacity-80">{{eyebrow}}</p>
			<h1 class="text-6xl font-extrabold leading-tight mt-2">{{title}}</h1>
			<p class="text-2xl opacity-90 mt-6 max-w-2xl">{{subtitle}}</p>
		</div>
		<div class="text-sm opacity-70">Prepared for {{targetName}}</div>
	</section>

	{{#each sections}}
	<section class="lm-page flex flex-col justify-center p-16 max-w-4xl mx-auto">
		<p class="uppercase tracking-widest text-xs accent-bg text-white inline-block px-2 py-1">Section {{@index}}</p>
		<h2 class="text-3xl font-bold mt-3 brand-fg">{{this.heading}}</h2>
		<div class="prose mt-4">{{{this.body}}}</div>
	</section>
	{{/each}}

	<section class="lm-page flex flex-col justify-center p-16 brand-bg text-white text-center">
		<h2 class="text-2xl font-semibold">{{cta.heading}}</h2>
		<p class="mt-3 max-w-xl mx-auto opacity-90">{{cta.body}}</p>
	</section>
</body>
</html>
